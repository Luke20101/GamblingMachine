<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VAULT — Cases</title>
<link rel="stylesheet" href="css/global.css"/>
<style>
.page{padding-top:70px;}
.page-header{padding:2rem 1.5rem 1rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
.mult-info{display:flex;align-items:center;gap:.6rem;background:rgba(144,64,255,.08);border:1px solid rgba(144,64,255,.25);padding:.4em 1em;border-radius:4px;}
.mult-info span{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--purple);}

.cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.2rem;padding:0 1.5rem 2rem;}
.case-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;
  cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;animation:gcIn .4s ease both;padding:1.5rem;display:flex;flex-direction:column;align-items:center;gap:.8rem;}
@keyframes gcIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.case-item:hover{transform:translateY(-5px);}
.case-icon{font-size:3.5rem;transition:transform .3s;}
.case-item:hover .case-icon{transform:scale(1.15) rotate(-5deg);}
.case-name{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.2em;}
.case-cost{font-size:.85rem;color:var(--gold);font-weight:700;}
.case-desc{font-size:.75rem;color:rgba(255,255,255,.4);text-align:center;line-height:1.5;}
.case-items-preview{display:flex;gap:.3rem;flex-wrap:wrap;justify-content:center;}
.pip{width:10px;height:10px;border-radius:50%;}

/* OPEN MODAL */
#openModal{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:400;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#openModal.open{opacity:1;pointer-events:all;}
.open-box{background:var(--bg2);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:2rem;width:min(92vw,600px);text-align:center;}
.open-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.2em;color:var(--purple);margin-bottom:.5rem;}

/* RESULT ITEM */
.result-card{display:inline-flex;flex-direction:column;align-items:center;gap:.5rem;
  padding:1.5rem;border-radius:8px;border:2px solid;margin:1rem auto;animation:resultPop .4s cubic-bezier(.3,1.4,.5,1);}
@keyframes resultPop{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
.result-icon{font-size:4rem;}
.result-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.15em;}
.result-value{font-size:.9rem;color:var(--gold);font-weight:700;}

/* INVENTORY */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.8rem;padding:0 1.5rem 3rem;}
.inv-item{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:.8rem;display:flex;flex-direction:column;align-items:center;gap:.4rem;}
.inv-item-icon{font-size:2rem;}
.inv-item-name{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.1em;text-align:center;}
.inv-item-val{font-size:.72rem;color:var(--gold);}
.inv-item-count{font-size:.65rem;color:rgba(255,255,255,.3);}
</style>
</head>
<body>
<div id="toast-container"></div>
<nav class="navbar">
  <a class="nav-logo" href="lobby.html">VAULT</a>
  <a class="nav-back" href="lobby.html">← Lobby</a>
  <div class="nav-spacer"></div>
  <div class="nav-coins"><span>💰</span><span id="navCoins">0</span></div>
</nav>
<div class="page">
  <div class="page-header">
    <div class="section-title">CASES</div>
    <div class="mult-info">📦 Kosten: ×<span id="multVal">1</span></div>
    <div style="font-size:.8rem;color:rgba(255,255,255,.3);letter-spacing:.1em;">Öffne Cases für Items und Coins</div>
  </div>
  <div class="cases-grid" id="casesGrid"></div>

  <div style="padding:0 1.5rem .5rem;"><div class="section-title" style="font-size:1.8rem;">INVENTAR</div></div>
  <div class="inv-grid" id="invGrid"></div>
</div>

<!-- OPEN MODAL -->
<div id="openModal">
  <div class="open-box">
    <div class="open-title" id="openTitle">ÖFFNE CASE</div>
    <p style="color:rgba(255,255,255,.4);font-size:.85rem;margin-bottom:1.5rem;" id="openSubtitle"></p>
    <div class="reel-wrap" style="margin:0 auto 1.5rem;" id="caseReel">
      <div class="reel-track" id="caseReelTrack"></div>
    </div>
    <div id="openResult" style="display:none;"></div>
    <div id="openActions">
      <button class="btn btn-gold" id="openSpinBtn" style="font-size:1.1rem;width:100%;">🎰 ÖFFNEN</button>
    </div>
  </div>
</div>

<script src="js/store.js"></script>
<script>
if(!Store.requireAuth()){}

const caseMult = Store.getCaseMult();
document.getElementById('multVal').textContent = caseMult;

const RARITY_COLORS = {common:'#888',uncommon:'#30e080',rare:'#3080ff',epic:'#9040ff',legendary:'#f0c040'};
const RARITY_NAMES  = {common:'Common',uncommon:'Uncommon',rare:'Rare',epic:'Epic',legendary:'Legendary'};

const CASE_DEFS = [
  {
    id:'starter', name:'STARTER CASE', icon:'📦', basePrice:150,
    desc:'Gutes Preis-Leistungs-Verhältnis. Coins und einfache Items.',
    color:'#888',
    items:[
      {name:'50 Coins',  icon:'💰', value:50,   rarity:'common',    isCoins:true,  weight:35},
      {name:'100 Coins', icon:'💰', value:100,  rarity:'common',    isCoins:true,  weight:25},
      {name:'Bronze Key',icon:'🗝️', value:80,   rarity:'uncommon',  isCoins:false, weight:18},
      {name:'250 Coins', icon:'💰', value:250,  rarity:'uncommon',  isCoins:true,  weight:12},
      {name:'Silver Key',icon:'🔑', value:200,  rarity:'rare',      isCoins:false, weight:6},
      {name:'500 Coins', icon:'💰', value:500,  rarity:'rare',      isCoins:true,  weight:3},
      {name:'Gold Star', icon:'⭐', value:400,  rarity:'epic',      isCoins:false, weight:1},
    ]
  },
  {
    id:'cyber', name:'CYBER CASE', icon:'💎', basePrice:400,
    desc:'Höhere Coins-Ausbeute. Seltene digitale Items.',
    color:'#3080ff',
    items:[
      {name:'200 Coins', icon:'💰', value:200,  rarity:'common',   isCoins:true,  weight:30},
      {name:'400 Coins', icon:'💰', value:400,  rarity:'common',   isCoins:true,  weight:22},
      {name:'Cyber Chip',icon:'🖥️', value:350,  rarity:'uncommon', isCoins:false, weight:18},
      {name:'750 Coins', icon:'💰', value:750,  rarity:'rare',     isCoins:true,  weight:14},
      {name:'Data Gem',  icon:'💠', value:600,  rarity:'rare',     isCoins:false, weight:8},
      {name:'1500 Coins',icon:'💰', value:1500, rarity:'epic',     isCoins:true,  weight:5},
      {name:'Neural Key',icon:'🧬', value:1200, rarity:'epic',     isCoins:false, weight:2},
      {name:'5000 Coins',icon:'💰', value:5000, rarity:'legendary',isCoins:true,  weight:1},
    ]
  },
  {
    id:'shadow', name:'SHADOW CASE', icon:'🌑', basePrice:800,
    desc:'Hohes Risiko, hohe Belohnung. Viele legendäre Items.',
    color:'#9040ff',
    items:[
      {name:'300 Coins', icon:'💰', value:300,   rarity:'common',    isCoins:true,  weight:20},
      {name:'Shadow Coin',icon:'🪙',value:500,   rarity:'uncommon',  isCoins:false, weight:18},
      {name:'1000 Coins',icon:'💰', value:1000,  rarity:'uncommon',  isCoins:true,  weight:15},
      {name:'Dark Rune', icon:'🔮', value:900,   rarity:'rare',      isCoins:false, weight:15},
      {name:'2000 Coins',icon:'💰', value:2000,  rarity:'rare',      isCoins:true,  weight:12},
      {name:'Void Crystal',icon:'💜',value:2000, rarity:'epic',      isCoins:false, weight:10},
      {name:'4000 Coins',icon:'💰', value:4000,  rarity:'epic',      isCoins:true,  weight:7},
      {name:'Shadow Crown',icon:'👑',value:5000, rarity:'legendary', isCoins:false, weight:2},
      {name:'10000 Coins',icon:'💰',value:10000, rarity:'legendary', isCoins:true,  weight:1},
    ]
  },
  {
    id:'legend', name:'LEGEND CASE', icon:'🏆', basePrice:2500,
    desc:'Die seltensten Items. Fast nur legendary drops.',
    color:'#f0c040',
    items:[
      {name:'1000 Coins', icon:'💰', value:1000,  rarity:'common',    isCoins:true,  weight:15},
      {name:'Rare Gem',   icon:'💎', value:1500,  rarity:'rare',      isCoins:false, weight:18},
      {name:'3000 Coins', icon:'💰', value:3000,  rarity:'rare',      isCoins:true,  weight:15},
      {name:'Epic Shield',icon:'🛡️', value:3000,  rarity:'epic',      isCoins:false, weight:18},
      {name:'5000 Coins', icon:'💰', value:5000,  rarity:'epic',      isCoins:true,  weight:15},
      {name:'Royal Sword',icon:'⚔️', value:8000,  rarity:'legendary', isCoins:false, weight:10},
      {name:'15000 Coins',icon:'💰', value:15000, rarity:'legendary', isCoins:true,  weight:7},
      {name:'Dragon Scale',icon:'🐉',value:20000, rarity:'legendary', isCoins:false, weight:1},
      {name:'50000 Coins',icon:'💰', value:50000, rarity:'legendary', isCoins:true,  weight:1},
    ]
  },
  {
    id:'mega', name:'MEGA JACKPOT', icon:'🎰', basePrice:5000,
    desc:'Nur für High-Roller. Wahnwitzige Gewinne möglich.',
    color:'#e03030',
    items:[
      {name:'2000 Coins', icon:'💰', value:2000,   rarity:'common',    isCoins:true,  weight:15},
      {name:'Mega Chip',  icon:'🎯', value:4000,   rarity:'uncommon',  isCoins:false, weight:18},
      {name:'8000 Coins', icon:'💰', value:8000,   rarity:'rare',      isCoins:true,  weight:20},
      {name:'20000 Coins',icon:'💰', value:20000,  rarity:'epic',      isCoins:true,  weight:20},
      {name:'Jackpot Key',icon:'🗝️', value:15000,  rarity:'epic',      isCoins:false, weight:12},
      {name:'50000 Coins',icon:'💰', value:50000,  rarity:'legendary', isCoins:true,  weight:10},
      {name:'Mega Trophy',icon:'🏆', value:80000,  rarity:'legendary', isCoins:false, weight:4},
      {name:'100K COINS', icon:'💰', value:100000, rarity:'legendary', isCoins:true,  weight:1},
    ]
  },
];

// Build grid
const grid = document.getElementById('casesGrid');
CASE_DEFS.forEach((c, i) => {
  const price = Math.round(c.basePrice * caseMult);
  const card = document.createElement('div');
  card.className = 'case-item';
  card.style.animationDelay = (i*.07)+'s';
  card.style.borderTop = `3px solid ${c.color}`;
  card.innerHTML = `
    <div class="case-icon">${c.icon}</div>
    <div class="case-name" style="color:${c.color}">${c.name}</div>
    <div class="case-cost">💰 ${Store.fmt(price)} Coins</div>
    <div class="case-desc">${c.desc}</div>
    <div class="case-items-preview">
      ${Object.entries(RARITY_COLORS).map(([r,col])=>`<div class="pip" style="background:${col}" title="${RARITY_NAMES[r]}"></div>`).join('')}
    </div>`;
  card.addEventListener('click', () => openCaseModal(c, price));
  grid.appendChild(card);
});

// INVENTORY
function renderInventory() {
  const u = Store.currentUser();
  const inv = (u && u.inventory) || {};
  const grid = document.getElementById('invGrid');
  const entries = Object.entries(inv);
  if (entries.length === 0) {
    grid.innerHTML = '<div style="color:rgba(255,255,255,.2);font-size:.85rem;letter-spacing:.15em;padding:1rem;">Noch keine Items — öffne Cases!</div>';
    return;
  }
  grid.innerHTML = '';
  entries.forEach(([name, data]) => {
    const el = document.createElement('div');
    el.className = 'inv-item';
    el.style.borderTop = `2px solid ${RARITY_COLORS[data.rarity] || '#888'}`;
    el.innerHTML = `<div class="inv-item-icon">${data.icon}</div>
      <div class="inv-item-name">${name}</div>
      <div class="inv-item-val">${Store.fmt(data.value)} Coins</div>
      <div class="inv-item-count">×${data.count}</div>`;
    grid.appendChild(el);
  });
}

function addToInventory(item) {
  const u = Store.currentUser();
  if (!u) return;
  if (!u.inventory) u.inventory = {};
  const key = item.name;
  if (u.inventory[key]) {
    u.inventory[key].count++;
  } else {
    u.inventory[key] = { icon: item.icon, value: item.value, rarity: item.rarity, count: 1 };
  }
  // Save directly
  const users = JSON.parse(localStorage.getItem('vault_users') || '{}');
  users[u.username] = u;
  localStorage.setItem('vault_users', JSON.stringify(users));
}

// CASE OPEN
let currentCase = null;
function openCaseModal(caseDef, price) {
  if (Store.getCoins() < price) { toast(`Nicht genug Coins! (${Store.fmt(price)} benötigt)`, 'error'); return; }
  currentCase = { caseDef, price };

  document.getElementById('openTitle').textContent = caseDef.name + ' ÖFFNEN';
  document.getElementById('openSubtitle').textContent = `Kosten: ${Store.fmt(price)} Coins`;
  document.getElementById('openResult').style.display = 'none';
  document.getElementById('openActions').innerHTML = `<button class="btn btn-gold" id="openSpinBtn" style="font-size:1.1rem;width:100%;">🎰 ÖFFNEN</button>`;
  document.getElementById('openSpinBtn').onclick = doOpenCase;

  // Build reel preview
  buildPreviewReel(caseDef);
  document.getElementById('openModal').classList.add('open');
}

function buildPreviewReel(caseDef) {
  const track = document.getElementById('caseReelTrack');
  track.innerHTML = '';
  track.style.transition = 'none';
  track.style.transform = 'translateX(0)';
  const pool = [];
  for (let i = 0; i < 60; i++) pool.push(caseDef.items[Math.floor(Math.random() * caseDef.items.length)]);
  pool.forEach(item => {
    const el = document.createElement('div');
    el.className = 'reel-item r-' + rarityToReelClass(item.rarity);
    el.innerHTML = `${item.icon}<span>${item.name.slice(0,8)}</span>`;
    track.appendChild(el);
  });
}

function rarityToReelClass(r) {
  return {common:'blue',uncommon:'blue',rare:'blue',epic:'purple',legendary:'gold'}[r] || 'blue';
}

function weightedPick(items) {
  const total = items.reduce((a, b) => a + b.weight, 0);
  let r = Math.random() * total;
  for (const item of items) { r -= item.weight; if (r <= 0) return item; }
  return items[0];
}

function doOpenCase() {
  if (!currentCase) return;
  const { caseDef, price } = currentCase;

  Store.addCoins(-price);
  Store.addStat('casesOpened');
  Store.updateNavCoins();

  document.getElementById('openSpinBtn').disabled = true;

  const winner = weightedPick(caseDef.items);

  // Place winner at pos 44 in reel
  const track = document.getElementById('caseReelTrack');
  const items = track.querySelectorAll('.reel-item');
  if (items[44]) {
    items[44].className = 'reel-item r-' + rarityToReelClass(winner.rarity);
    items[44].innerHTML = `${winner.icon}<span>${winner.name.slice(0,8)}</span>`;
  }

  const reel = document.getElementById('caseReel');
  const ITEM_W = 100;
  const center = reel.offsetWidth / 2 - ITEM_W / 2;
  const targetX = -(44 * ITEM_W - center);
  track.style.transition = 'none';
  track.style.transform = 'translateX(0)';
  track.getBoundingClientRect();
  track.style.transition = 'transform 3.8s cubic-bezier(0.04,.5,.12,1)';
  track.style.transform = `translateX(${targetX}px)`;

  setTimeout(() => {
    const flash = document.createElement('div');
    flash.className = 'win-flash';
    reel.appendChild(flash);
    setTimeout(() => flash.remove(), 1200);

    // Apply win
    if (winner.isCoins) {
      Store.addCoins(winner.value);
      Store.addStat('totalWon', winner.value);
    } else {
      addToInventory(winner);
    }
    Store.updateNavCoins();

    // Show result
    const rc = RARITY_COLORS[winner.rarity] || '#fff';
    const resultEl = document.getElementById('openResult');
    resultEl.style.display = 'block';
    resultEl.innerHTML = `
      <div class="result-card" style="border-color:${rc};background:${rc}18;">
        <div class="result-icon">${winner.icon}</div>
        <div class="result-name" style="color:${rc}">${winner.name}</div>
        <div style="font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:${rc};opacity:.7;">${RARITY_NAMES[winner.rarity]}</div>
        <div class="result-value">${winner.isCoins ? '+'+Store.fmt(winner.value)+' COINS' : 'Wert: '+Store.fmt(winner.value)+' Coins'}</div>
      </div>`;

    spawnParticles(window.innerWidth/2, window.innerHeight*0.4,
      [rc,'#fff',rc], winner.rarity === 'legendary' ? 50 : winner.rarity === 'epic' ? 30 : 16);

    document.getElementById('openActions').innerHTML = `
      <div style="display:flex;gap:.8rem;justify-content:center;">
        <button class="btn btn-gold" onclick="openCaseModal(currentCase.caseDef, currentCase.price)">NOCHMAL ÖFFNEN</button>
        <button class="btn btn-ghost" onclick="document.getElementById('openModal').classList.remove('open');renderInventory();">SCHLIESSEN</button>
      </div>`;

    renderInventory();
  }, 4000);
}

document.getElementById('openModal').addEventListener('click', e => {
  if (e.target === document.getElementById('openModal')) {
    document.getElementById('openModal').classList.remove('open');
  }
});

Store.updateNavCoins();
renderInventory();
</script>
</body>
</html>
